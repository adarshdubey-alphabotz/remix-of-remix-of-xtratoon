# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name xtratoon.com www.xtratoon.com 69.197.168.220;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Connection limits
    limit_conn addr 50;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Variable for dynamic upstream resolution
    set $supabase_backend nyynuigabiwfgvwvjrvh.supabase.co;

    # ─── Proxy: REST API (/rest/) ───
    location /rest/ {
        limit_req zone=api burst=20 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS, HEAD, PUT' always;
            add_header 'Access-Control-Allow-Headers' 'authorization, apikey, content-type, x-client-info, x-supabase-client-platform, x-supabase-client-platform-version, x-supabase-client-runtime, x-supabase-client-runtime-version, accept-profile, content-profile, prefer, accept, range' always;
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        proxy_pass https://$supabase_backend/rest/;
        proxy_ssl_server_name on;
        proxy_set_header Host $supabase_backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # ─── Proxy: Auth API (/auth/) ───
    location /auth/ {
        limit_req zone=auth burst=10 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'authorization, apikey, content-type, x-client-info, x-supabase-client-platform, x-supabase-client-platform-version, x-supabase-client-runtime, x-supabase-client-runtime-version' always;
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        proxy_pass https://$supabase_backend/auth/;
        proxy_ssl_server_name on;
        proxy_set_header Host $supabase_backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # ─── Proxy: Edge Functions (/functions/) ───
    location /functions/ {
        limit_req zone=api burst=10 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'authorization, apikey, content-type, x-client-info, x-supabase-client-platform, x-supabase-client-platform-version, x-supabase-client-runtime, x-supabase-client-runtime-version' always;
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        proxy_pass https://$supabase_backend/functions/;
        proxy_ssl_server_name on;
        proxy_set_header Host $supabase_backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # ─── Proxy: Realtime (/realtime/) ───
    location /realtime/ {
        proxy_pass https://$supabase_backend/realtime/;
        proxy_ssl_server_name on;
        proxy_set_header Host $supabase_backend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 86400;
    }

    # ─── Proxy: Storage (/storage/) ───
    location /storage/ {
        limit_req zone=general burst=30 nodelay;
        proxy_pass https://$supabase_backend/storage/;
        proxy_ssl_server_name on;
        proxy_set_header Host $supabase_backend;
    }

    # ─── Cache static assets ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Block sensitive files ───
    location ~ /\. { deny all; }
    location ~ \.(env|git|bak|sql|log)$ { deny all; }

    # ─── SPA fallback ───
    location / {
        limit_req zone=general burst=40 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # ─── Error pages ───
    error_page 429 /429.html;
    location = /429.html {
        internal;
        default_type text/html;
        return 429 '<!DOCTYPE html><html><head><title>Rate Limited</title></head><body><h1>Too Many Requests</h1><p>Please slow down and try again later.</p></body></html>';
    }
}
