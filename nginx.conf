# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Upstream backend (proxied so real URL never leaks to browser)
upstream supabase_rest {
    server nyynuigabiwfgvwvjrvh.supabase.co:443;
}

server {
    listen 80;
    server_name xtratoon.com www.xtratoon.com;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Connection limits ───
    limit_conn addr 50;

    # ─── Gzip ───
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ─── Security headers (all responses) ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com; frame-ancestors 'self';" always;

    # ─── CORS (only allow our domain) ───
    set $cors_origin "";
    if ($http_origin ~* "^https://(www\.)?xtratoon\.com$") {
        set $cors_origin $http_origin;
    }

    # ─── Proxy: REST API (/rest/) ───
    location /rest/ {
        limit_req zone=api burst=20 nodelay;

        # CORS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'authorization, apikey, content-type, x-client-info, x-supabase-client-platform, x-supabase-client-platform-version, x-supabase-client-runtime, x-supabase-client-runtime-version, accept-profile, content-profile, prefer' always;
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        proxy_pass https://nyynuigabiwfgvwvjrvh.supabase.co/rest/;
        proxy_ssl_server_name on;
        proxy_set_header Host nyynuigabiwfgvwvjrvh.supabase.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
    }

    # ─── Proxy: Auth API (/auth/) ───
    location /auth/ {
        limit_req zone=auth burst=3 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'authorization, apikey, content-type, x-client-info' always;
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        proxy_pass https://nyynuigabiwfgvwvjrvh.supabase.co/auth/;
        proxy_ssl_server_name on;
        proxy_set_header Host nyynuigabiwfgvwvjrvh.supabase.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
    }

    # ─── Proxy: Edge Functions (/functions/) ───
    location /functions/ {
        limit_req zone=api burst=10 nodelay;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'authorization, apikey, content-type, x-client-info' always;
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        proxy_pass https://nyynuigabiwfgvwvjrvh.supabase.co/functions/;
        proxy_ssl_server_name on;
        proxy_set_header Host nyynuigabiwfgvwvjrvh.supabase.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header Access-Control-Allow-Origin;
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
    }

    # ─── Proxy: Realtime (/realtime/) ───
    location /realtime/ {
        proxy_pass https://nyynuigabiwfgvwvjrvh.supabase.co/realtime/;
        proxy_ssl_server_name on;
        proxy_set_header Host nyynuigabiwfgvwvjrvh.supabase.co;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 86400;
    }

    # ─── Proxy: Storage (/storage/) ───
    location /storage/ {
        limit_req zone=general burst=30 nodelay;
        proxy_pass https://nyynuigabiwfgvwvjrvh.supabase.co/storage/;
        proxy_ssl_server_name on;
        proxy_set_header Host nyynuigabiwfgvwvjrvh.supabase.co;
    }

    # ─── Cache static assets ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Block sensitive files ───
    location ~ /\. { deny all; }
    location ~ \.(env|git|bak|sql|log)$ { deny all; }

    # ─── SPA fallback ───
    location / {
        limit_req zone=general burst=40 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # ─── Error pages ───
    error_page 429 /429.html;
    location = /429.html {
        internal;
        default_type text/html;
        return 429 '<!DOCTYPE html><html><head><title>Rate Limited</title></head><body><h1>Too Many Requests</h1><p>Please slow down and try again later.</p></body></html>';
    }
}
